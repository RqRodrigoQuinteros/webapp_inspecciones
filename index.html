<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspecciones Sanitarias</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/app.css">
    <meta name="theme-color" content="#007bff">
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="login-screen" class="screen active">
        <h1>Login</h1>
        <input type="text" id="dni-input" placeholder="Ingrese su DNI">
        <button id="login-btn">Ingresar</button>
        <div id="login-error"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen" class="screen">
        <header>
            <h1>Dashboard</h1>
            <div id="status-dot"></div>
        </header>
        <div id="stats"></div>
        <input type="text" id="search" placeholder="Buscar inspecciones">
        <select id="filter-status">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="completada">Completada</option>
        </select>
        <ul id="inspections-list"></ul>
        <button id="new-inspection-btn">Nueva Inspección</button>
    </div>

    <!-- Formulario -->
    <div id="form-screen" class="screen">
        <header>
            <button id="back-btn">← Volver</button>
            <h1>Inspección</h1>
        </header>
        <form id="inspection-form">
            <!-- Campos dinámicos se generan aquí -->
        </form>
        <button id="save-btn">Guardar</button>
    </div>

    <!-- Detalle -->
    <div id="detail-screen" class="screen">
        <header>
            <button id="back-detail-btn">← Volver</button>
            <h1>Detalle de Inspección</h1>
        </header>
        <div id="inspection-detail"></div>
    </div>

    <!-- Config -->
    <div id="config-screen" class="screen">
        <h1>Configuración</h1>
        <!-- Configuraciones aquí -->
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
